services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lingoloop
      POSTGRES_PASSWORD: lingoloop_dev_password
      POSTGRES_DB: lingoloop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: lingoloop
      DB_PASSWORD: lingoloop_dev_password
      DB_DATABASE: lingoloop
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      NODE_ENV: development
    depends_on:
      - db
    volumes:
      - ../server/src:/app/src

volumes:
  pgdata:
