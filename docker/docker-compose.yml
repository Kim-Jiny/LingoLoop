services:
  lingo-db:
    image: postgres:16-alpine
    container_name: lingo-db
    environment:
      POSTGRES_USER: lingoloop
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: lingoloop
    ports:
      - "127.0.0.1:55436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingoloop -d lingoloop"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  lingo-loop:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "3004:3000"
    env_file:
      - .env
    depends_on:
      lingo-db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    external: true